<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1250" viewBox="0 0 900 1250">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8eef4" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d5dde7" stroke-width="1.2"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#202020" stroke-width="1.8"/>
    </marker>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#111827}
      .head{font:600 17px Arial,sans-serif;fill:#111827}
      .label{font:15px Arial,sans-serif;fill:#111827}
      .life{stroke:#202020;stroke-width:2;stroke-dasharray:4 7}
      .msg{stroke:#202020;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .ret{stroke:#202020;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .act{fill:#fff;stroke:#202020;stroke-width:2}
    </style>
  </defs>

  <rect width="900" height="1250" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" class="title">Registered Student Sequence Diagram</text>

  <text x="105" y="78" text-anchor="middle" class="head">Student</text>
  <text x="315" y="78" text-anchor="middle" class="head">Frontend</text>
  <text x="525" y="78" text-anchor="middle" class="head">Backend API</text>
  <text x="735" y="78" text-anchor="middle" class="head">Database</text>

  <line x1="105" y1="95" x2="105" y2="1215" class="life"/>
  <line x1="315" y1="95" x2="315" y2="1215" class="life"/>
  <line x1="525" y1="95" x2="525" y2="1215" class="life"/>
  <line x1="735" y1="95" x2="735" y2="1215" class="life"/>

  <line x1="105" y1="135" x2="315" y2="135" class="msg"/>
  <text x="125" y="123" class="label">Enter email and password</text>
  <line x1="315" y1="190" x2="525" y2="190" class="msg"/>
  <text x="365" y="178" class="label">POST /api/auth/login</text>
  <rect x="513" y="198" width="24" height="46" class="act"/>
  <line x1="525" y1="230" x2="735" y2="230" class="msg"/>
  <text x="577" y="218" class="label">Check credentials</text>
  <line x1="735" y1="295" x2="525" y2="295" class="ret"/>
  <text x="610" y="282" class="label">User found</text>
  <line x1="525" y1="350" x2="315" y2="350" class="ret"/>
  <text x="372" y="337" class="label">Auth success</text>
  <line x1="315" y1="405" x2="105" y2="405" class="ret"/>
  <text x="125" y="392" class="label">Redirect to account</text>

  <line x1="105" y1="475" x2="315" y2="475" class="msg"/>
  <text x="135" y="463" class="label">Search / filter courses</text>
  <line x1="315" y1="530" x2="525" y2="530" class="msg"/>
  <text x="365" y="518" class="label">GET /api/courses</text>
  <rect x="513" y="538" width="24" height="46" class="act"/>
  <line x1="525" y1="570" x2="735" y2="570" class="msg"/>
  <text x="585" y="558" class="label">Fetch courses</text>
  <line x1="735" y1="635" x2="525" y2="635" class="ret"/>
  <text x="595" y="622" class="label">Return courses</text>
  <line x1="525" y1="690" x2="315" y2="690" class="ret"/>
  <text x="372" y="677" class="label">Send course list</text>
  <line x1="315" y1="740" x2="105" y2="740" class="ret"/>
  <text x="135" y="727" class="label">Display courses</text>

  <line x1="105" y1="815" x2="315" y2="815" class="msg"/>
  <text x="132" y="803" class="label">Submit course review</text>
  <line x1="315" y1="870" x2="525" y2="870" class="msg"/>
  <text x="333" y="858" class="label">POST /api/courses/[slug]/reviews</text>
  <rect x="513" y="878" width="24" height="46" class="act"/>
  <line x1="525" y1="910" x2="735" y2="910" class="msg"/>
  <text x="568" y="898" class="label">Save review ratings/text</text>
  <line x1="735" y1="970" x2="525" y2="970" class="ret"/>
  <text x="612" y="957" class="label">Review saved</text>
  <line x1="525" y1="1025" x2="315" y2="1025" class="ret"/>
  <text x="370" y="1012" class="label">Review success</text>
  <line x1="315" y1="1075" x2="105" y2="1075" class="ret"/>
  <text x="132" y="1062" class="label">Refresh reviews</text>

  <line x1="105" y1="1135" x2="315" y2="1135" class="msg"/>
  <text x="132" y="1123" class="label">Select vote on review</text>
  <line x1="315" y1="1190" x2="525" y2="1190" class="msg"/>
  <text x="365" y="1178" class="label">POST /api/reviews/id/vote</text>
  <path d="M525 1210 h70 v-45 h-70" class="msg"/>
  <text x="598" y="1198" class="label">Process vote</text>
</svg>

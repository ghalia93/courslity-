<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1250" viewBox="0 0 900 1250">
  <defs>
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e8eef4" stroke-width="1"/>
    </pattern>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#smallGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#d5dde7" stroke-width="1.2"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 2 2 L 10 6 L 2 10" fill="none" stroke="#202020" stroke-width="1.8"/>
    </marker>
    <style>
      .title{font:700 28px Arial,sans-serif;fill:#111827}
      .head{font:600 17px Arial,sans-serif;fill:#111827}
      .label{font:15px Arial,sans-serif;fill:#111827}
      .small{font:13px Arial,sans-serif;fill:#111827}
      .life{stroke:#202020;stroke-width:2;stroke-dasharray:4 7}
      .msg{stroke:#202020;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .ret{stroke:#202020;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .act{fill:#fff;stroke:#202020;stroke-width:2}
    </style>
  </defs>

  <rect width="900" height="1250" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" class="title">Visitor Sequence Diagram</text>

  <text x="105" y="78" text-anchor="middle" class="head">Visitor</text>
  <text x="315" y="78" text-anchor="middle" class="head">Frontend</text>
  <text x="525" y="78" text-anchor="middle" class="head">Backend API</text>
  <text x="735" y="78" text-anchor="middle" class="head">Database</text>

  <line x1="105" y1="95" x2="105" y2="1215" class="life"/>
  <line x1="315" y1="95" x2="315" y2="1215" class="life"/>
  <line x1="525" y1="95" x2="525" y2="1215" class="life"/>
  <line x1="735" y1="95" x2="735" y2="1215" class="life"/>

  <line x1="105" y1="135" x2="315" y2="135" class="msg"/>
  <text x="130" y="123" class="label">Open Coursality website</text>

  <line x1="315" y1="190" x2="525" y2="190" class="msg"/>
  <text x="362" y="178" class="label">GET /api/courses</text>
  <rect x="513" y="198" width="24" height="46" class="act"/>
  <line x1="525" y1="230" x2="735" y2="230" class="msg"/>
  <text x="576" y="218" class="label">Fetch public courses</text>
  <line x1="735" y1="300" x2="525" y2="300" class="ret"/>
  <text x="595" y="287" class="label">Return courses</text>
  <line x1="525" y1="360" x2="315" y2="360" class="ret"/>
  <text x="372" y="347" class="label">Send course list</text>
  <line x1="315" y1="415" x2="105" y2="415" class="ret"/>
  <text x="130" y="402" class="label">Display courses</text>

  <line x1="105" y1="485" x2="315" y2="485" class="msg"/>
  <text x="144" y="473" class="label">Select course details</text>
  <line x1="315" y1="540" x2="525" y2="540" class="msg"/>
  <text x="350" y="528" class="label">GET /courses/[slug]</text>
  <rect x="513" y="548" width="24" height="46" class="act"/>
  <line x1="525" y1="580" x2="735" y2="580" class="msg"/>
  <text x="575" y="568" class="label">Fetch details + reviews</text>
  <line x1="735" y1="645" x2="525" y2="645" class="ret"/>
  <text x="580" y="632" class="label">Return course data</text>
  <line x1="525" y1="705" x2="315" y2="705" class="ret"/>
  <text x="350" y="692" class="label">Course details response</text>
  <line x1="315" y1="760" x2="105" y2="760" class="ret"/>
  <text x="125" y="747" class="label">Display course details</text>

  <line x1="105" y1="835" x2="315" y2="835" class="msg"/>
  <text x="128" y="823" class="label">Click "Leave review"</text>
  <path d="M315 875 h-70 v45 h70" class="msg"/>
  <text x="176" y="903" class="label">Check login status</text>
  <line x1="315" y1="970" x2="105" y2="970" class="ret"/>
  <text x="133" y="957" class="label">Show login required toast</text>

  <line x1="105" y1="1035" x2="315" y2="1035" class="msg"/>
  <text x="124" y="1023" class="label">Send support message</text>
  <line x1="315" y1="1090" x2="525" y2="1090" class="msg"/>
  <text x="360" y="1078" class="label">POST /api/support/chat</text>
  <rect x="513" y="1098" width="24" height="46" class="act"/>
  <line x1="525" y1="1130" x2="735" y2="1130" class="msg"/>
  <text x="555" y="1118" class="label">Create visitor thread/message</text>
  <line x1="735" y1="1185" x2="525" y2="1185" class="ret"/>
  <text x="604" y="1172" class="label">Message saved</text>
  <line x1="525" y1="1210" x2="315" y2="1210" class="ret"/>
  <text x="370" y="1197" class="label">Chat success</text>
</svg>
